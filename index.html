<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gift Card</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #111111, #2a2a2a 45%, #c8a96b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      color: #f5deb3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: 32px;
      line-height: 1.25;
    }
    .sub {
      margin: 0 auto 24px;
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255,255,255,0.9);
      max-width: 420px;
    }
    .amount {
      font-size: 46px;
      font-weight: 700;
      color: #f5deb3;
      margin: 10px 0 24px;
    }
    button {
      border: none;
      background: #ffffff;
      color: #111;
      padding: 14px 22px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.92; }
    .details {
      display: none;
      margin-top: 24px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      padding: 18px;
      text-align: right;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-size: 16px;
    }
    .row:last-child { border-bottom: none; }
    .label { color: rgba(255,255,255,0.75); }
    .value { font-weight: 700; letter-spacing: 0.5px; }
    .note {
      margin-top: 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">FACTORY 54 Gift Card</div>
    <h1>איזה כיף! קיבלת גיפט קארד לרשת FACTORY 54</h1>
    <p class="sub">הזן קוד גישה בן 8 ספרות כדי לצפות בקוד השובר.</p>
    <div class="amount">₪200</div>

    <div style="display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap;">
      <input id="pinInput" type="password" inputmode="numeric" maxlength="8" placeholder="הזן קוד גישה" style="padding:14px 16px; border-radius:14px; border:none; width:220px; font-size:16px; text-align:center;" />
      <button onclick="showDetails()">הצג שובר</button>
    </div>
    <div id="errorMsg" style="display:none; color:#ffd6d6; margin-top:6px; font-size:14px;">קוד שגוי. יש להזין 8 ספרות.</div>

    <div id="details" class="details">
      <div class="row">
        <span class="label">קוד שובר</span>
        <span class="value">FACTORY54-200-GIFT</span>
      </div>
      <div class="row">
        <span class="label">בתוקף עד</span>
        <span class="value">31/12/2026</span>
      </div>
      <div class="row">
        <span class="label">למימוש</span>
        <span class="value">בסניפים ובאתר</span>
      </div>
      <div class="note">לפני פרסום, החלף את קוד הגישה והפרטים בדוגמה בפרטים שלך.</div>
    </div>
  </div>

  <script>
    const ACCESS_CODE = '12345678';

    function showDetails() {
      const pin = document.getElementById('pinInput').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const details = document.getElementById('details');

      if (!/^\d{8}$/.test(pin) || pin !== ACCESS_CODE) {
        errorMsg.style.display = 'block';
        details.style.display = 'none';
        return;
      }

      errorMsg.style.display = 'none';
      details.style.display = 'block';
    }
  </script>
</body>
</html>
